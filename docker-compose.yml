services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ohmyscribe
      POSTGRES_PASSWORD: ohmyscribe
      POSTGRES_DB: ohmyscribe
    ports:
      - "5432:5432"
    volumes:
      - ohmyscribe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohmyscribe -d ohmyscribe"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  ohmyscribe_pgdata:
